name: Score Submission

on:
  pull_request_target:
    paths:
      - 'submissions/*.enc'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      repository-projects: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn pycryptodome pyyaml tabulate

      - name: Run Evaluation
        id: eval
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: |
          # 1. Force the runner to fetch the files from the PR branch
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr_branch
          git checkout pr_branch -- submissions/

          # 2. Find the submission file (Ignoring the sample file)
          # We look for any .enc that IS NOT sample_submission.enc
          FILE=$(ls submissions/*.enc | grep -v "sample_submission.enc" | head -n 1)
          
          # 3. Fallback: If ONLY the sample exists, use it
          if [ -z "$FILE" ]; then 
            FILE=$(ls submissions/sample_submission.enc 2>/dev/null || true)
          fi

          if [ -z "$FILE" ]; then
            echo "score=No New Submission" >> $GITHUB_OUTPUT
            echo "multi_note=ℹ️ No .enc submission files found." >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Selected file: $FILE"

          # 4. Prepare metadata for the PR comment
          FILENAME=$(basename "$FILE")
          TEAM_NAME="${FILENAME%.*}"
          echo "team_name=$TEAM_NAME" >> $GITHUB_OUTPUT
          echo "multi_note=✅ Evaluating submission: \`$FILE\`" >> $GITHUB_OUTPUT

          # 5. Run the evaluation script
          python competition/evaluate.py --file "$FILE" | tee out.txt
          
          # 6. Extract and format the score (8 decimal precision)
          RAW_SCORE=$(grep "SCORE_MAE" out.txt | awk '{print $2}')
          
          if [ -z "$RAW_SCORE" ] || [ "$RAW_SCORE" == "None" ]; then
            echo "score=Error" >> $GITHUB_OUTPUT
          else
            FORMATTED_SCORE=$(printf "%.8f" $RAW_SCORE)
            echo "score=$FORMATTED_SCORE" >> $GITHUB_OUTPUT
          fi
          

      - name: Post Score to PR
        uses: mshick/add-pr-comment@v2
        if: always()
        with:
          message: |
            ## 🧠 Brain-Age GNN Submission Result
            
            **Team:** `${{ steps.eval.outputs.team_name || 'Unknown' }}`
            **Score (MAE):** `${{ steps.eval.outputs.score }}`
            
            ${{ steps.eval.outputs.multi_note }}

            ---
            📌 **Note:** The leaderboard will be updated after this PR is merged into `main`.