name: Score Submission

on:
  pull_request:
    paths:
      - 'submissions/*.enc'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn pycryptodome pyyaml tabulate

      - name: Run Evaluation
        id: eval
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: |
          # Detect the changed .enc file in the PR
          FILE=$(git diff --name-only origin/main...HEAD | grep 'submissions/.*\.enc$' | head -n 1)
          
          if [ -z "$FILE" ]; then
            echo "No .enc file detected in submissions/ folder."
            exit 1
          fi
          
          echo "Processing file: $FILE"
          
          # Run the evaluation script and capture the MAE score
          python competition/evaluate.py --file "$FILE" | tee out.txt
          
          # Extract the score from the output line "SCORE_MAE: X.XXXX"
          SCORE=$(grep "SCORE_MAE" out.txt | awk '{print $2}')
          
          if [ -z "$SCORE" ]; then
            echo "score=Error: Could not calculate MAE" >> $GITHUB_OUTPUT
          else
            echo "score=$SCORE" >> $GITHUB_OUTPUT
          fi

      - name: Post Score to PR
        uses: mshick/add-pr-comment@v2
        if: always()
        with:
          message: |
            ## 🧠 Brain-Age GNN Submission Result
            
            **Score (MAE):** `${{ steps.eval.outputs.score }}`
            
            ---
            *Note: The official leaderboard will update automatically once this Pull Request is merged into the main branch.*