name: Update Leaderboard

on:
  push:
    branches:
      - main
    paths:
      - 'submissions/*.enc'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pycryptodome tabulate

      - name: Run Leaderboard Script
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: python update_leaderboard.py

      - name: Commit and Push Changes
        run: |
          git config --local user.name "Leaderboard Bot"
          git config --local user.email "actions@github.com"
          
          # Only add directories if they exist to avoid 'pathspec' errors
          if [ -d "leaderboard" ]; then git add leaderboard/; fi
          if [ -d "docs" ]; then git add docs/; fi
          
          # Commit only if there are changes; exit 0 prevents failure if nothing changed
          git commit -m "Update Leaderboard [skip ci]" || exit 0
          git push