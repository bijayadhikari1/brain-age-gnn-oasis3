name: Update Leaderboard

on:
  push:
    branches:
      - main
    paths:
      # CHANGE 1: Trigger when any .enc file is added to the submissions folder
      - 'submissions/*.enc'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas tabulate

      - name: Run Leaderboard Script
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
        run: python update_leaderboard.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Use -f (force) or check if folder exists
          if [ -d "leaderboard" ]; then git add leaderboard/; fi
          if [ -d "docs" ]; then git add docs/; fi
          
          # The "|| exit 0" tells GitHub: "If there's nothing to commit, don't fail"
          git commit -m "Auto-update leaderboard [skip ci]" || exit 0
          git push origin main